name: Run Makefile

on:
  schedule:
    - cron: '0 0 1 * *'

  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin jq
          ogr2ogr --version
          jq --version

      - name: Clean generated files
        run: |
          make clean

      - name: Generate default data
        run: |
          make data

      - name: Generate de jure USA data
        run: |
          make data BOUNDARY_VIEW=de_jure POV=usa

      - name: Prepare comparison checksums
        run: |
          cd data
          sha256sum \
            countries.geojson \
            countries_de_jure_usa.geojson \
            > SOURCE_SHA256SUMS

      - name: Check previous release
        if: github.event_name != 'pull_request'
        id: changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p previous

          if gh release download data-latest -p SOURCE_SHA256SUMS -D previous; then
            if cmp -s data/SOURCE_SHA256SUMS previous/SOURCE_SHA256SUMS; then
              echo "changed=false" >> "$GITHUB_OUTPUT"
              echo "No data changes"
            else
              echo "changed=true" >> "$GITHUB_OUTPUT"
              echo "Data changed"
            fi
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "No previous release found"
          fi

      - name: Prepare release checksums
        if: github.event_name != 'pull_request' && steps.changes.outputs.changed == 'true'
        run: |
          cd data
          sha256sum \
            countries.geojson \
            countries.geojson.gz \
            countries_de_jure_usa.geojson \
            countries_de_jure_usa.geojson.gz \
            > SHA256SUMS

      - name: Publish data release
        if: github.event_name != 'pull_request' && steps.changes.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          UPDATED_AT="$(date -u +'%Y-%m-%d %H:%M:%S UTC')"

          gh release delete data-latest --cleanup-tag -y || true

          gh release create data-latest \
            data/countries.geojson \
            data/countries.geojson.gz \
            data/countries_de_jure_usa.geojson \
            data/countries_de_jure_usa.geojson.gz \
            data/SOURCE_SHA256SUMS \
            data/SHA256SUMS \
            --title "Latest generated data" \
            --notes "Generated country boundary data.

          Updated at: ${UPDATED_AT}"