name: Run Makefile

on:
  schedule:
    - cron: '0 0 1 * *'

  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin jq
          ogr2ogr --version
          jq --version

      - name: Clean generated files
        run: |
          make clean

      - name: Generate default data
        run: |
          make data

      - name: Generate de jure USA data
        run: |
          make data BOUNDARY_VIEW=de_jure POV=usa

      - name: Commit generated data
        if: github.event_name != 'pull_request'
        env:
          CI_COMMIT_NAME: "Automated commit"
          CI_COMMIT_EMAIL: "actions@users.noreply.github.com"
          CI_COMMIT_MESSAGE: "Automated commit"
        run: |
          git config --global user.email "${CI_COMMIT_EMAIL}"
          git config --global user.name "${CI_COMMIT_NAME}"

          git add data/countries.geojson data/countries.geojson.gz
          git add data/countries_de_jure_usa.geojson data/countries_de_jure_usa.geojson.gz

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "${CI_COMMIT_MESSAGE}"
            git push
          fi